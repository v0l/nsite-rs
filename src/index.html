<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSite Directory - Decentralized Web Hosting on Nostr</title>
    <meta name="description" content="Discover and host websites on the Nostr decentralized network. NSite enables censorship-resistant web hosting using Nostr events and subdomain-based routing.">
    <meta name="keywords" content="nostr, decentralized hosting, censorship-resistant, web3, p2p, subdomain hosting, nip5a">
    <meta name="author" content="NSite">
    <link rel="canonical" href="https://nwb.tf">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nwb.tf/">
    <meta property="og:title" content="NSite Directory - Decentralized Web Hosting on Nostr">
    <meta property="og:description" content="Discover and host websites on the Nostr decentralized network. Censorship-resistant web hosting using Nostr events.">
    <meta property="og:image" content="https://nwb.tf/og-image.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://nwb.tf/">
    <meta property="twitter:title" content="NSite Directory - Decentralized Web Hosting on Nostr">
    <meta property="twitter:description" content="Discover and host websites on the Nostr decentralized network. Censorship-resistant web hosting using Nostr events.">
    <meta property="twitter:image" content="https://nwb.tf/og-image.png">
    
    <!-- Theme color for browser UI -->
    <meta name="theme-color" content="#18181b">
    
    <!-- Structured data for SEO -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "NSite Directory",
        "url": "https://nwb.tf",
        "description": "Discover and host websites on the Nostr decentralized network. Censorship-resistant web hosting using Nostr events and NIP-5A subdomain routing.",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://nwb.tf/{pubkey}",
            "query-input": "required name=pubkey"
        }
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: hsl(222.2 47.4% 11.2%);
            background: hsl(0 0% 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        h1 {
            color: hsl(222.2 47.4% 11.2%);
            margin-bottom: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: hsl(215 20.2% 65.1%);
            margin-bottom: 32px;
            font-size: 1.25rem;
        }

        .status {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 32px;
            font-weight: 600;
            font-size: 0.875rem;
            background: hsl(210 40% 96.1%);
            color: hsl(222.2 47.4% 11.2%);
        }

        .status.loading {
            background: hsl(210 40% 96.1%);
        }

        .status.success {
            background: hsl(142 76% 36% / 0.1);
            color: hsl(142 76% 36%);
        }

        .status.error {
            background: hsl(0 84% 60% / 0.1);
            color: hsl(0 84% 60%);
        }

        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .site-card {
            border: 1px solid hsl(214.3 31.8% 91.4%);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            background: hsl(0 0% 100%);
            box-shadow: 0 1px 3px hsl(0 0% 0% / 0.1);
            display: flex;
            flex-direction: column;
        }

        .site-card:hover {
            border-color: hsl(215 20.2% 65.1%);
            box-shadow: 0 10px 15px -3px hsl(0 0% 0% / 0.1), 0 4px 6px -2px hsl(0 0% 0% / 0.05);
            transform: translateY(-2px);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: hsl(210 40% 96.1%);
            border: none;
        }

        .profile-name {
            font-weight: 700;
            font-size: 1.125rem;
            color: hsl(222.2 47.4% 11.2%);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .site-type-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6875rem;
            font-weight: 600;
            margin-left: 6px;
        }

        .site-type-badge.named {
            background: hsl(262 83% 58%);
            color: white;
        }

        .site-description {
            font-size: 0.9375rem;
            color: hsl(215.4 16.3% 46.9%);
            margin-top: 8px;
            line-height: 1.6;
            max-height: 3.2em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .site-meta {
            font-size: 0.75rem;
            color: hsl(215 20.2% 65.1%);
            margin-top: 12px;
            font-weight: 500;
        }

        .visit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 16px;
            padding: 10px 20px;
            background: hsl(222.2 47.4% 11.2%);
            color: hsl(210 40% 98%);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 1px 3px hsl(0 0% 0% / 0.1);
            align-self: flex-start;
        }

        .visit-btn:hover {
            background: hsl(217.2 32.6% 17.5%);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px hsl(0 0% 0% / 0.15);
        }

        .visit-btn.source-btn {
            margin-left: 8px;
            background: hsl(210 40% 96.1%);
            color: hsl(222.2 47.4% 11.2%);
        }

        .visit-btn.source-btn:hover {
            background: hsl(215 20.2% 65.1%);
            color: white;
        }

        .relay-info {
            margin-top: 40px;
            padding: 20px;
            background: hsl(0 0% 98%);
            border-radius: 12px;
            font-size: 0.875rem;
            border: 1px solid hsl(214.3 31.8% 91.4%);
        }

        .relay-info h3 {
            margin-bottom: 16px;
            color: hsl(222.2 47.4% 11.2%);
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .relay-list {
            list-style: none;
            margin-bottom: 12px;
        }

        .relay-list li {
            padding: 6px 0;
            color: hsl(215 20.2% 65.1%);
            font-size: 0.8125rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .connection-status {
            padding-top: 12px;
            border-top: 1px solid hsl(214.3 31.8% 91.4%);
            color: hsl(215 20.2% 65.1%);
            font-size: 0.8125rem;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import {v4 as uuidv4} from 'https://esm.sh/uuid@11.1.0';
    
    if (!crypto.randomUUID) {
        crypto.randomUUID = uuidv4;
    }

    import {h, render, Component} from 'https://esm.sh/preact@10.29.0';
    import {useState, useEffect, useRef} from 'https://esm.sh/preact@10.29.0/hooks';
    import {NostrSystem, RequestBuilder, NostrLink} from 'https://esm.sh/@snort/system@2.0.0-pre.11';
    import {hex} from 'https://esm.sh/@scure/base@1.2.6';

    const base36 = {
        encode: (bytes) => {
            const alphabet = '0123456789abcdefghijklmnopqrstuvwxyz';
            let num = BigInt('0x' + hex.encode(bytes));
            if (num === 0n) return '0';
            let result = '';
            while (num > 0n) {
                result = alphabet[Number(num % 36n)] + result;
                num = num / 36n;
            }
            return result;
        }
    };

    const RELAYS = [
        'wss://relay.damus.io',
        'wss://relay.snort.social',
        'wss://relay.primal.net',
        'wss://nos.lol'
    ];

    const ROOT_SITE_KIND = 15128;
    const NAMED_SITE_KIND = 35128;

    const system = new NostrSystem({automaticOutboxModel: false});
    system.Init().then(() => {
        Promise.all(RELAYS.map(r => system.ConnectToRelay(r))).catch(console.error);
    }).catch(console.error);

    function SiteCard({event, profile}) {
        const npubKey = NostrLink.publicKey(event.pubkey).encode();
        const dTag = event.tags?.find(tag => tag[0] === 'd')?.[1];
        const sourceUrl = event.tags?.find(tag => tag[0] === 'source')?.[1];
        const isNamed = !!dTag;

        const formatTimestamp = (timestamp) => {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        };

        const avatarSrc = profile?.picture || `https://nostr-rs-api.v0l.io/avatar/robots/${event.pubkey}`;
        const displayName = profile?.display_name || profile?.name || npubKey.substring(0, 16) + '...';
        const description = profile?.about || '';

        const pubkeyBytes = hex.decode(event.pubkey);
        const pubkeyB36 = base36.encode(pubkeyBytes).toLowerCase();
        const subdomain = isNamed ? `${pubkeyB36}${dTag}` : npubKey;
        return h('div', {class: 'site-card'},
            h('div', {class: 'profile-header'},
                h('img', {class: 'profile-avatar', src: avatarSrc, alt: 'Profile avatar'}),
                h('div', {class: 'profile-name'},
                    displayName,
                    isNamed && h('span', {class: 'site-type-badge named'}, dTag)
                )
            ),
            description && h('div', {class: 'site-description'}, description),
            h('div', {class: 'site-meta'}, `Created: ${formatTimestamp(event.created_at)}`),
            h('a', {
                class: 'visit-btn',
                href: `http://${subdomain}.${window.location.host}`,
                target: '_blank',
                rel: 'noopener noreferrer'
            }, 'Visit Site'),
            sourceUrl && h('a', {
                class: 'visit-btn source-btn',
                href: sourceUrl,
                target: '_blank',
                rel: 'noopener noreferrer'
            }, 'Source')
        );
    }

    function Directory() {
        const [sites, setSites] = useState([]);
        const [status, setStatus] = useState('loading');

        useEffect(() => {
            const fetchSites = async () => {
                try {
                    setStatus('Connecting to Nostr relays...');
                    const rb = new RequestBuilder('sites');
                    rb.withFilter().kinds([ROOT_SITE_KIND, NAMED_SITE_KIND]).relay(RELAYS);

                    const evs = await system.Fetch(rb);

                    if (!evs || evs.length === 0) {
                        setStatus('No sites found yet. Be the first to create one!');
                        return;
                    }

                    const hasIndexPath = (event) => {
                        return event.tags?.some(tag => tag[0] === 'path' && tag[1] === '/index.html');
                    };

                    const indexEvents = evs.filter(hasIndexPath);

                    const eventsByPubkey = new Map();
                    for (const event of indexEvents) {
                        const existing = eventsByPubkey.get(event.pubkey);
                        if (!existing || event.created_at > existing.created_at) {
                            eventsByPubkey.set(event.pubkey, event);
                        }
                    }

                    const sortedEvents = Array.from(eventsByPubkey.values())
                        .sort((a, b) => b.created_at - a.created_at);

                    sortedEvents.forEach(event => {
                        system.profileLoader.TrackKeys(event.pubkey);
                    });

                    await new Promise(resolve => setTimeout(resolve, 1000));

                    setSites(sortedEvents);
                    setStatus(`Found ${sortedEvents.length} site(s)`);
                } catch (error) {
                    console.error('Error:', error);
                    setStatus(`Error: ${error.message}`);
                }
            };

            fetchSites();

            const handleProfileUpdate = (keys) => {
                keys.forEach(pubkey => {
                    const profile = system.profileLoader.cache.getFromCache(pubkey);
                    if (profile) {
                        setSites(prev => prev.filter(e => e.pubkey !== pubkey));
                        system.profileLoader.TrackKeys(pubkey);
                    }
                });
            };

            system.profileLoader.cache.on('change', handleProfileUpdate);

            return () => {
                if (system.profileLoader?.cache) {
                    system.profileLoader.cache.off('change', handleProfileUpdate);
                }
            };
        }, []);

        const getProfile = (pubkey) => {
            if (!system.profileLoader?.cache) return null;
            return system.profileLoader.cache.getFromCache(pubkey);
        };

        return h('div', {class: 'container'},
            h('h1', null, 'NSite Directory'),
            h('p', {class: 'subtitle'}, 'Discover sites hosted on Nostr'),
            h('div', {class: `status ${status === 'loading' ? 'loading' : status.includes('Found') ? 'success' : 'error'}`}, status),
            sites.length > 0 && h('div', {class: 'sites-grid'},
                sites.map(event => h(SiteCard, {key: event.id, event, profile: getProfile(event.pubkey)}))
            ),
            h('div', {class: 'relay-info'},
                h('h3', null, 'Relay Configuration'),
                h('ul', {class: 'relay-list'},
                    RELAYS.map(relay => h('li', {key: relay}, relay))
                )
            )
        );
    }

    render(h(Directory), document.getElementById('app'));
</script>
</body>
</html>
